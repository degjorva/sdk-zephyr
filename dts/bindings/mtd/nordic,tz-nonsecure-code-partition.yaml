description: |
  Tags a flash/RRAM partition as an ARM TrustZone Non-Secure code slot.
  Peer of "nordic,tz-nonsecure-data-partition".

  The TF-M build uses this to compute FLASH_NS_PARTITION_SIZE, the size
  of a single non-secure image slot. Multiple okay nodes are allowed for
  multi-slot MCUboot layouts, but they must all have the same reg size;
  a BUILD_ASSERT enforces this.

  Example:

      slot0_ns_partition: partition@8a000 {
          compatible = "nordic,tz-nonsecure-code-partition";
          label = "image-0-nonsecure";
          reg = <0x0008a000 DT_SIZE_K(940)>;
      };

compatible: "nordic,tz-nonsecure-code-partition"

include: [base.yaml]

properties:
  reg:
    required: true
  label:
    type: string
    required: false
